<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sign-Up-Form</title>
</head>
<body>

<div class="content-wrapper">
    <div class="box" id="picture">
        <img src="halie-west-25xggax4bSA-unsplash.jpg" alt="halie-west picture">
    </div> <!--First Box End-->
    <div class="box" id="content" >
        <div class="top-right-block">
            <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up now to get started.</p>
            <p>You know you want to.</p>
        </div>
        <div class="middle-right-block">

            <h1>Let's do this!</h1>
            
            <div class="label-input-block">

            <div class="user-input">
                <label class="label" for="first-name">FIRST NAME</label>
                <input type="text" name="first-name" id="first-name">
            </div>    

            <div class="user-input">
                <label class="label" for="last-name">LAST NAME</label>
                <input type="text" name="last_name" id="last-name">
            </div>

            <div class="user-input">
                <label class="label" for="e-mail">EMAIL</label>
                <input type="e-mail" name="e-mail" id="e-mail">
            </div>    

            <div class="user-input">
                <label class="label" for="phone-number">PHONE NUMBER</label>
                <input type="tel" name="phone-number" id="phone-number">
            </div>

            <div class="user-input">
                <label class="label" for="password">PASSWORD</label>
                <input type="password" name="password" id="password">
            </div>   

            <div class="user-input">
                <label class="label" for="confirm-password">CONFIRM PASSWORD</label>
                <input type="password" name="confirm-password" id="confirm-password">
            </div>
            </div><!--Label Input Block End-->

        </div> <!--Middle Right Block End-->
        <div class="lower-right-block">

            <button type="submit">Create Account</button>
            <div>Already have an account? Log In</div>

        </div> <!--Lower Right Block End-->
    </div> <!--Second Box End-->
</div> <!--Content Wrapper End-->
    
</body>

</html>
